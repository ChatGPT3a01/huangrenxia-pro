<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>隨身黃仁蝦AI系統 — SkillHub 技能市場</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;--bg5:#333;
  --primary:#ff6b35;--primary-dim:#cc5529;--primary-bg:rgba(255,107,53,.08);
  --text:#e0e0e0;--text2:#888;--text3:#555;
  --success:#4caf50;--error:#f44336;--warn:#ffc107;--info:#2196f3;
  --radius:10px;--radius-sm:8px;
}
body{font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}

/* Sidebar */
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--bg4);padding:20px 0;flex-shrink:0;height:100vh;position:sticky;top:0;overflow-y:auto}
.sidebar .logo{text-align:center;font-size:32px;margin-bottom:4px}
.sidebar h2{text-align:center;font-size:15px;margin-bottom:4px}
.sidebar .sub{text-align:center;font-size:11px;color:var(--text3);margin-bottom:20px}
.sidebar .nav-item{display:block;padding:10px 20px;color:var(--text2);font-size:13px;cursor:pointer;border-left:3px solid transparent;transition:.2s;text-decoration:none}
.sidebar .nav-item:hover{background:var(--bg3);color:var(--text)}
.sidebar .nav-item.active{border-left-color:var(--primary);color:var(--primary);background:var(--primary-bg)}
.sidebar .nav-section{padding:8px 20px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:12px}

/* Main */
.main{flex:1;padding:24px 32px;overflow-y:auto;height:100vh}

/* Search */
.search-bar{display:flex;gap:12px;margin-bottom:24px;align-items:center}
.search-bar input{flex:1;background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius-sm);padding:12px 16px;color:var(--text);font-size:14px;outline:none;transition:.2s}
.search-bar input:focus{border-color:var(--primary)}
.search-bar input::placeholder{color:var(--text3)}
.search-bar .count{color:var(--text3);font-size:13px;white-space:nowrap}

/* Sort */
.sort-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.sort-btn{background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius-sm);padding:6px 14px;color:var(--text2);font-size:12px;cursor:pointer;transition:.2s}
.sort-btn:hover{border-color:var(--text3);color:var(--text)}
.sort-btn.active{border-color:var(--primary);color:var(--primary);background:var(--primary-bg)}

/* Skill grid */
.skill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.skill-card{background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);padding:18px;transition:.2s;cursor:default}
.skill-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 4px 16px rgba(255,107,53,.1)}
.skill-card .name{font-size:15px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.skill-card .author{font-size:11px;color:var(--text3);margin-bottom:8px}
.skill-card .desc{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.skill-card .tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.skill-card .tag{padding:2px 8px;border-radius:4px;font-size:11px;background:var(--bg4);color:var(--text2)}
.skill-card .stats{display:flex;gap:12px;font-size:11px;color:var(--text3)}
.skill-card .install-cmd{background:var(--bg);border:1px solid var(--bg4);border-radius:6px;padding:8px 10px;font-family:"Cascadia Code",Consolas,monospace;font-size:12px;color:var(--primary);margin-top:10px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.skill-card .copy-btn{background:var(--bg4);border:none;border-radius:4px;padding:4px 8px;color:var(--text2);cursor:pointer;font-size:11px;transition:.2s}
.skill-card .copy-btn:hover{background:var(--primary);color:#fff}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--text3)}
.loading .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--bg4);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty .icon{font-size:48px;margin-bottom:12px}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--success);border-radius:var(--radius-sm);padding:10px 18px;color:var(--text);font-size:13px;transform:translateX(120%);transition:.3s;z-index:100}
.toast.show{transform:translateX(0)}

/* Footer */
.footer{text-align:center;color:var(--text3);font-size:11px;margin-top:24px;padding:16px 0}

@media(max-width:700px){
  .sidebar{display:none}
  .skill-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">🦐</div>
  <h2>SkillHub</h2>
  <div class="sub">技能市場</div>

  <div class="nav-section">分類</div>
  <a class="nav-item active" data-cat="all" onclick="filterCat('all',this)">全部技能</a>
  <a class="nav-item" data-cat="productivity" onclick="filterCat('productivity',this)">工作效率</a>
  <a class="nav-item" data-cat="content" onclick="filterCat('content',this)">內容創作</a>
  <a class="nav-item" data-cat="coding" onclick="filterCat('coding',this)">程式開發</a>
  <a class="nav-item" data-cat="customer-service" onclick="filterCat('customer-service',this)">客服應答</a>
  <a class="nav-item" data-cat="education" onclick="filterCat('education',this)">教育學習</a>
  <a class="nav-item" data-cat="data" onclick="filterCat('data',this)">數據分析</a>
  <a class="nav-item" data-cat="translation" onclick="filterCat('translation',this)">翻譯寫作</a>
  <a class="nav-item" data-cat="lifestyle" onclick="filterCat('lifestyle',this)">生活助手</a>

  <div class="nav-section">連結</div>
  <a class="nav-item" href="https://clawhub.ai/skills?sort=downloads" target="_blank">ClawHub 官網</a>
  <a class="nav-item" href="Welcome.html">快速上手</a>
  <a class="nav-item" href="Config.html">設定嚮導</a>
</div>

<div class="main">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="搜尋技能名稱、描述..." oninput="doSearch()">
    <span class="count" id="resultCount">--</span>
  </div>

  <div class="sort-bar">
    <button class="sort-btn active" data-sort="downloads" onclick="setSort('downloads',this)">最多下載</button>
    <button class="sort-btn" data-sort="name" onclick="setSort('name',this)">名稱</button>
    <button class="sort-btn" data-sort="recent" onclick="setSort('recent',this)">最近更新</button>
  </div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <div>正在載入技能列表...</div>
    </div>
  </div>

  <div class="footer">
    © 2026 阿亮老師（曾慶良）版權所有 | 隨身黃仁蝦AI系統 v2.0<br>
    技能來源：<a href="https://clawhub.ai" target="_blank" style="color:var(--primary)">ClawHub.ai</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Pre-loaded skill data (offline-capable with local skills + ClawHub popular ones)
let allSkills = [];
let currentCat = 'all';
let currentSort = 'downloads';
let searchQuery = '';

// Built-in skill catalog (pre-installed + popular from ClawHub)
const BUILTIN_SKILLS = [
  { name:'copywriting', desc:'專業文案撰寫助手，支援行銷文案、社群貼文、廣告文案等多種場景', author:'阿亮老師', cat:'content', downloads:12500, tags:['行銷','文案'] },
  { name:'seo-audit', desc:'網站 SEO 健檢工具，分析關鍵字排名、Meta 標籤、頁面速度等', author:'阿亮老師', cat:'content', downloads:8900, tags:['SEO','行銷'] },
  { name:'social-content', desc:'社群媒體內容產生器（Facebook、Instagram、LINE 等）', author:'阿亮老師', cat:'content', downloads:11200, tags:['社群','內容'] },
  { name:'email-sequence', desc:'Email 行銷序列規劃工具，設計自動化郵件流程', author:'阿亮老師', cat:'content', downloads:6700, tags:['Email','行銷'] },
  { name:'ad-creative', desc:'廣告創意設計助手，支援 Google Ads、FB Ads 等文案', author:'阿亮老師', cat:'content', downloads:7800, tags:['廣告','創意'] },
  { name:'content-strategy', desc:'內容策略規劃工具，分析目標受眾並制定內容日曆', author:'阿亮老師', cat:'content', downloads:5400, tags:['策略','規劃'] },
  { name:'ai-image-prompt', desc:'AI 繪圖提示詞產生器（Midjourney、DALL-E、Stable Diffusion）', author:'阿亮老師', cat:'content', downloads:15000, tags:['AI繪圖','提示詞'] },
  { name:'ai-video-script', desc:'AI 影片腳本撰寫工具，支援 YouTube、短影音等格式', author:'阿亮老師', cat:'content', downloads:9300, tags:['影片','腳本'] },
  { name:'meeting-notes', desc:'會議記錄整理工具，自動摘要討論重點與待辦事項', author:'阿亮老師', cat:'productivity', downloads:13200, tags:['會議','效率'] },
  { name:'proposal-writer', desc:'提案書撰寫助手，快速產生專業提案文件', author:'阿亮老師', cat:'productivity', downloads:7100, tags:['提案','文件'] },
  { name:'data-analysis', desc:'數據分析助手，支援 Excel 資料整理、圖表建議、報告撰寫', author:'阿亮老師', cat:'data', downloads:10500, tags:['數據','分析'] },
  { name:'competitor-analysis', desc:'競品分析工具，對比產品功能、價格、市場定位', author:'阿亮老師', cat:'data', downloads:6200, tags:['競品','分析'] },
  { name:'translation', desc:'多語言翻譯助手，支援繁中/簡中/英/日/韓等語言', author:'ClawHub', cat:'translation', downloads:25000, tags:['翻譯','多語言'] },
  { name:'code-review', desc:'程式碼審查工具，檢查潛在 Bug、效能問題、安全漏洞', author:'ClawHub', cat:'coding', downloads:18000, tags:['程式','審查'] },
  { name:'chatbot-builder', desc:'聊天機器人設計工具，建立客服/銷售自動對話流程', author:'ClawHub', cat:'customer-service', downloads:14500, tags:['聊天機器人','客服'] },
  { name:'quiz-maker', desc:'測驗題目產生器，支援選擇題、是非題、配對題等', author:'ClawHub', cat:'education', downloads:11800, tags:['教育','測驗'] },
  { name:'lesson-planner', desc:'課程教案設計助手，依課綱產生教學計畫', author:'ClawHub', cat:'education', downloads:9600, tags:['教育','教案'] },
  { name:'resume-builder', desc:'履歷表撰寫助手，針對不同職位客製化內容', author:'ClawHub', cat:'productivity', downloads:16200, tags:['履歷','求職'] },
  { name:'recipe-helper', desc:'食譜推薦與烹飪助手，依食材推薦菜色', author:'ClawHub', cat:'lifestyle', downloads:8400, tags:['料理','生活'] },
  { name:'travel-planner', desc:'旅遊行程規劃工具，自動安排景點、交通、住宿', author:'ClawHub', cat:'lifestyle', downloads:12100, tags:['旅遊','規劃'] },
];

function init() {
  allSkills = BUILTIN_SKILLS;
  render();
}

function filterCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  render();
}

function setSort(sort, el) {
  currentSort = sort;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  render();
}

function doSearch() {
  searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();
  render();
}

function render() {
  let skills = allSkills.filter(s => {
    if (currentCat !== 'all' && s.cat !== currentCat) return false;
    if (searchQuery) {
      const hay = (s.name + ' ' + s.desc + ' ' + (s.tags||[]).join(' ')).toLowerCase();
      return hay.includes(searchQuery);
    }
    return true;
  });

  // Sort
  if (currentSort === 'downloads') skills.sort((a,b) => (b.downloads||0) - (a.downloads||0));
  else if (currentSort === 'name') skills.sort((a,b) => a.name.localeCompare(b.name));
  else if (currentSort === 'recent') skills.sort((a,b) => (b.downloads||0) - (a.downloads||0)); // fallback

  document.getElementById('resultCount').textContent = skills.length + ' 個技能';

  if (skills.length === 0) {
    document.getElementById('content').innerHTML = `
      <div class="empty">
        <div class="icon">🔍</div>
        <div>找不到符合條件的技能</div>
      </div>`;
    return;
  }

  document.getElementById('content').innerHTML = `
    <div class="skill-grid">
      ${skills.map(s => `
        <div class="skill-card">
          <div class="name">${s.name}</div>
          <div class="author">by ${s.author || 'unknown'}</div>
          <div class="desc">${s.desc}</div>
          <div class="tags">${(s.tags||[]).map(t => `<span class="tag">${t}</span>`).join('')}</div>
          <div class="stats">
            <span>⬇ ${formatNum(s.downloads)} 下載</span>
          </div>
          <div class="install-cmd">
            <code>npx clawhub@latest install ${s.name}</code>
            <button class="copy-btn" onclick="copyCmd('npx clawhub@latest install ${s.name}')">複製</button>
          </div>
        </div>
      `).join('')}
    </div>`;
}

function formatNum(n) {
  if (!n) return '0';
  if (n >= 10000) return (n/1000).toFixed(1) + 'k';
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return n.toString();
}

function copyCmd(text) {
  navigator.clipboard.writeText(text).then(() => {
    const el = document.getElementById('toast');
    el.textContent = '已複製安裝指令！';
    el.className = 'toast show';
    setTimeout(() => el.classList.remove('show'), 2000);
  });
}

init();
</script>
</body>
</html>
